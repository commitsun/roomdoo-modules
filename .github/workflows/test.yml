name: Tests

on:
  push:
    branches: ["16.0"]
  pull_request:
    branches: ["16.0"]

jobs:
  test:
    runs-on: ubuntu-22.04

    services:
      postgres:
        image: postgres:12
        env:
          POSTGRES_USER: odoo
          POSTGRES_PASSWORD: odoo
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ODOO_VERSION: "16.0"
      PGHOST: localhost
      PGPORT: 5432
      PGUSER: odoo
      PGPASSWORD: odoo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          path: repo

      - name: Checkout Odoo
        uses: actions/checkout@v4
        with:
          repository: odoo/odoo
          ref: "16.0"
          path: odoo
          fetch-depth: 1

      - name: Clone dependencies
        run: |
          pip install git-aggregator
          git config --global user.email "ci@example.com"
          git config --global user.name "CI"
          if [ -f repo/repos.yaml ]; then
            gitaggregate -c repo/repos.yaml
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libfreetype6-dev \
            libfribidi-dev \
            libghc-zlib-dev \
            libharfbuzz-dev \
            libjpeg-dev \
            liblcms2-dev \
            libldap2-dev \
            libopenjp2-7-dev \
            libpq-dev \
            libsasl2-dev \
            libtiff5-dev \
            libwebp-dev \
            libxml2-dev \
            libxslt-dev \
            tcl-dev \
            tk-dev \
            zlib1g-dev \
            openssl \
            libssl-dev

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip setuptools wheel coverage

          # gevent / greenlet fixes for Python 3.10
          sed -i -E "s/(gevent==)21\.8\.0/\122.10.2/" odoo/requirements.txt
          sed -i -E "s/(greenlet==)1\.1\.2/\12.0.2/" odoo/requirements.txt

          pip install cryptography==38.0.4 pyOpenSSL==22.1.0 urllib3==1.26.18
          pip install -r odoo/requirements.txt
          pip install -r repo/requirements.txt

          for dep in deps/*; do
              if [ -f "$dep/requirements.txt" ]; then
                  pip install -r "$dep/requirements.txt"
              fi
              if [ -f "$dep/test-requirements.txt" ]; then
                  pip install -r "$dep/test-requirements.txt"
              fi
          done


      - name: Build addons path
        id: addons
        run: |
          ADDONS_PATH="odoo/addons,repo"
          for dir in deps/*; do
            [ -d "$dir" ] && ADDONS_PATH="$ADDONS_PATH,$dir"
          done
          echo "path=$ADDONS_PATH" >> $GITHUB_OUTPUT

      - name: Get modules to test
        id: modules
        run: |
          cd repo
          MODULES=$(find . -maxdepth 2 -name "__manifest__.py" -exec dirname {} \; \
            | xargs -I {} basename {} | tr '\n' ',' | sed 's/,$//')

          echo "modules=$MODULES" >> $GITHUB_OUTPUT
          echo "Testing: $MODULES"

      - name: Run tests with coverage
        run: |
          TEST_TAGS=$(echo "${{ steps.modules.outputs.modules }}" | sed 's/,/,\//g; s/^/\//')

          coverage run --source=repo \
            odoo/odoo-bin \
            --addons-path=${{ steps.addons.outputs.path }} \
            -d test_db \
            --http-interface=127.0.0.1 \
            --http-port=8069 \
            -i ${{ steps.modules.outputs.modules }} \
            --test-enable \
            --test-tags=$TEST_TAGS \
            --stop-after-init \
            --log-level=test

      - name: Coverage summary
        if: always()
        run: |
          echo "## 📊 Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          coverage report >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
